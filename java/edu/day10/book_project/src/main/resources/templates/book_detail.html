<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>도서 상세</title>
</head>
<body>
<h1>도서 상세</h1>

<table border="1" cellpadding="8" cellspacing="0">
    <tr><th>ID</th><td th:text="${book.bookId}"></td></tr>
    <tr><th>제목</th><td th:text="${book.title}"></td></tr>
    <tr><th>저자</th><td th:text="${book.author}"></td></tr>
    <tr><th>출판사</th><td th:text="${book.publisher}"></td></tr>
    <tr><th>ISBN</th><td th:text="${book.isbn}"></td></tr>
    <tr><th>카테고리</th><td th:text="${book.category}"></td></tr>
    <tr><th>가격</th><td th:text="${book.price}"></td></tr>
    <tr><th>재고</th><td th:text="${book.stock}"></td></tr>
    <tr><th>출판일</th><td th:text="${book.publishedDate}"></td></tr>
    <tr><th>설명</th><td th:text="${book.description}"></td></tr>
    <tr><th>생성일</th><td th:text="${book.createdAt}"></td></tr>
    <tr><th>수정일</th><td th:text="${book.updatedAt}"></td></tr>
</table>

<br>
<a th:href="@{/book/list}">목록</a>
<a th:href="@{/book/modify/{bookId}(bookId=${book.bookId})}">수정</a>
<a th:href="@{/book/delete/{bookId}(bookId=${book.bookId})}"
   onclick="return confirm('정말 삭제하시겠습니까?');">삭제</a>

</body>
</html>
