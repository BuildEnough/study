<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>오늘 뭐 묵노</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>
  <body>
    <div class="container">
      <h1>뭐 묵노</h1>
      <div class="card" th:if="${recommendFood != null}">
        <h2>오늘의 추천</h2>
        <p><strong th:text="${recommendFood.name}">음식명</strong></p>
        <p th:text="${recommendFood.category}">카테고리</p>
        <p>평점: <span th:text="${recommendFood.rating}">5</span></p>
      </div>
      <div class="menu">
        <a href="/foods">음식 목록</a>
        <a href="/foods/new">음식 등록</a>
      </div>
    </div>
  </body>
</html>
