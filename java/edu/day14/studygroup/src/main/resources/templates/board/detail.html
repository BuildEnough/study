<!doctype html>
<html
  lang="ko"
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{layout :: layout(~{::content}, ~{::pageScripts})}"
>
  <div th:fragment="content" class="container my-3">
    <h3>게시판 상세</h3>

    <table class="table table-bordered">
      <thead class="table-dark">
        <tr>
          <th colspan="2" class="text-center" th:text="${board.title}"></th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <th style="width: 10%">번호</th>
          <td style="width: 90%" th:text="${board.boardId}"></td>
        </tr>
        <tr>
          <th>작성자</th>
          <td th:text="${board.name} + '[' + ${board.writer} + ']'"></td>
        </tr>
        <tr>
          <th>작성일</th>
          <td
            th:text="${#temporals.format(board.createdAt, 'yyyy-MM-dd HH:mm')}"
          ></td>
        </tr>
        <tr>
          <th>수정일</th>
          <td
            th:text="${#temporals.format(board.updatedAt, 'yyyy-MM-dd HH:mm')}"
          ></td>
        </tr>
        <tr>
          <th>내용</th>
          <td th:utext="${board.content}"></td>
        </tr>
      </tbody>
    </table>

    <h3 class="mt-4 mb-3">댓글 목록</h3>

    <!-- table-bordered: 테이블 경계선 -->
    <table class="table mt-3">
      <thead class="table-dark">
        <tr>
          <th style="width: 10%">번호</th>
          <th style="width: 45%">댓글 내용</th>
          <th style="width: 15%">작성자</th>
          <th style="width: 20%">작성일</th>
          <th style="width: 10%">삭제</th>
        </tr>
      </thead>
      <tbody>
        <tr th:if="${#lists.isEmpty(replyList)}">
          <td colspan="5" class="text-center">댓글이 없습니다.</td>
        </tr>
        <tr th:each="reply : ${replyList}">
          <td th:text="${reply.replyId}"></td>
          <td th:text="${reply.replyContent}"></td>
          <td th:text="${reply.replyWriter}"></td>
          <td
            th:text="${#temporals.format(reply.createdAt, 'yyyy-MM-dd HH:mm')}"
          ></td>
          <td>
            <form th:action="@{|/reply/delete/${reply.replyId}|}" method="post">
              <input type="hidden" name="boardId" th:value="${board.boardId}" />
              <button type="submit" class="btn btn-sm btn-outline-danger">
                <i class="bi bi-trash-fill"></i>삭제
              </button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>

    <!-- 댓글 작성 영역 -->
    <div class="row">
      <div class="col">
        <div
          th:if="${message}"
          class="alert alert-danger"
          th:text="${message}"
        ></div>
        <form
          th:action="@{/reply/create}"
          th:object="${replyForm}"
          method="post"
          class="mt-3"
        >
          <input type="hidden" th:field="*{boardId}" />

          <div class="mb-3">
            <label for="replyWriter" class="form-label">작성자</label>
            <input
              type="text"
              id="replyWriter"
              th:field="*{replyWriter}"
              class="form-control"
            />
            <div class="text-danger mt-1" th:errors="*{replyWriter}"></div>
          </div>

          <div class="mb-3">
            <label for="replyContent" class="form-label">댓글 내용</label>
            <textarea
              id="replyContent"
              th:field="*{replyContent}"
              class="form-control"
              rows="4"
            ></textarea>
            <div class="text-danger mt-1" th:errors="*{replyContent}"></div>
          </div>

          <button type="submit" class="btn btn-primary">댓글 등록</button>
        </form>
      </div>
    </div>

    <!-- 이 태그는 버튼 누를시만 표시 -->
    <!-- 삭제 확인 모달 -->
    <div
      class="modal fade"
      id="deleteModal"
      tabindex="-1"
      aria-labelledby="deleteModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="deleteModalLabel">삭제 확인</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>

          <div class="modal-body">삭제하시겠습니까?</div>

          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-sm btn-danger"
              id="confirmDeleteBtn"
            >
              예
            </button>
            <button
              type="button"
              class="btn btn-sm btn-secondary"
              data-bs-dismiss="modal"
            >
              아니오
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- 자바스크립트 영역 -->
    <script>
      // confirmDeleteBtn '예'를 클릭하면 전체 페이지에서 deleteForm 아이디 태그를 찾아서 submit을 발동
      document
        .getElementById("confirmDeleteBtn")
        .addEventListener("click", function () {
          document.getElementById("deleteForm").submit();
        });
    </script>
  </div>
</html>
