<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>웹 실습 인덱스</title>
    <style>
        :root {
            --bg1: #eef4ff;
            --bg2: #f8fbff;
            --primary: #4f46e5;
            --primary-dark: #312e81;
            --accent: #06b6d4;
            --text: #1f2937;
            --subtext: #6b7280;
            --card-bg: rgba(255, 255, 255, 0.82);
            --card-border: rgba(255, 255, 255, 0.55);
            --shadow: 0 18px 40px rgba(79, 70, 229, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Malgun Gothic", "맑은 고딕", "Segoe UI", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(79, 70, 229, 0.12), transparent 30%),
                radial-gradient(circle at top right, rgba(6, 182, 212, 0.14), transparent 28%),
                linear-gradient(135deg, var(--bg1), var(--bg2));
            min-height: 100vh;
        }

        .wrap {
            max-width: 1400px;
            margin: 0 auto;
            padding: 36px 20px 70px;
        }

        .hero {
            position: relative;
            overflow: hidden;
            border-radius: 28px;
            padding: 46px 32px;
            background: linear-gradient(135deg, #4338ca, #06b6d4);
            color: white;
            box-shadow: 0 22px 45px rgba(67, 56, 202, 0.28);
            margin-bottom: 30px;
        }

        .hero::before,
        .hero::after {
            content: "";
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.12);
        }

        .hero::before {
            width: 240px;
            height: 240px;
            top: -80px;
            right: -60px;
        }

        .hero::after {
            width: 150px;
            height: 150px;
            bottom: -45px;
            left: -25px;
        }

        .hero-content {
            position: relative;
            z-index: 1;
        }

        .badge {
            display: inline-block;
            margin-bottom: 16px;
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 0.85rem;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.16);
            backdrop-filter: blur(8px);
        }

        .hero h1 {
            margin: 0;
            font-size: clamp(2rem, 4vw, 3rem);
            line-height: 1.2;
        }

        .hero p {
            margin: 12px 0 0;
            font-size: 1.02rem;
            opacity: 0.95;
        }

        .notice {
            margin-top: 18px;
            padding: 14px 16px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.14);
            border: 1px solid rgba(255, 255, 255, 0.18);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .section-title {
            display: flex;
            justify-content: space-between;
            align-items: end;
            gap: 12px;
            margin: 10px 0 20px;
        }

        .section-title h2 {
            margin: 0;
            font-size: 1.45rem;
        }

        .section-title p {
            margin: 0;
            color: var(--subtext);
            font-size: 0.95rem;
        }

        .day-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 22px;
        }

        .day-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 22px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(12px);
            transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
        }

        .day-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 26px 44px rgba(79, 70, 229, 0.17);
            border-color: rgba(79, 70, 229, 0.18);
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 18px;
        }

        .card-top h3 {
            margin: 0;
            font-size: 1.25rem;
            color: var(--primary-dark);
        }

        .count {
            display: inline-block;
            padding: 7px 12px;
            border-radius: 999px;
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--primary);
            background: rgba(79, 70, 229, 0.08);
            white-space: nowrap;
        }

        .examples {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .examples a {
            text-decoration: none;
            color: var(--primary-dark);
            background: linear-gradient(135deg, #ffffff, #eef2ff);
            border: 1px solid #dbe3ff;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 0.92rem;
            font-weight: 700;
            transition: all 0.2s ease;
            box-shadow: 0 6px 14px rgba(79, 70, 229, 0.06);
        }

        .examples a:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            border-color: transparent;
            box-shadow: 0 12px 20px rgba(79, 70, 229, 0.24);
        }

        footer {
            text-align: center;
            margin-top: 42px;
            color: var(--subtext);
            font-size: 0.92rem;
        }

        @media (max-width: 768px) {
            .wrap {
                padding: 24px 16px 50px;
            }

            .hero {
                padding: 34px 22px;
                border-radius: 24px;
            }

            .section-title {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        @media (max-width: 480px) {
            .examples a {
                width: 100%;
                text-align: center;
            }

            .day-card {
                padding: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <header class="hero">
            <div class="hero-content">
                <div class="badge">BuildEnough / study / edu / web</div>
                <h1>웹 실습 인덱스</h1>
                <p>실제 파일명을 기준으로 정리한 HTML 실습 모음 페이지</p>
            </div>
        </header>

        <section class="section-title">
            <h2>실습 파일 목록</h2>
            <p>파일명을 클릭하면 해당 예제로 이동합니다.</p>
        </section>

        <main class="day-list" id="dayList"></main>

        <footer>
        </footer>
    </div>

            "ex13-04crud.html"

    };

    const dayList = document.getElementById("dayList");

    Object.entries(practiceData).forEach(([day, files]) => {
        const card = document.createElement("section");
        card.className = "day-card";

        const top = document.createElement("div");
        top.className = "card-top";

        const title = document.createElement("h3");
        title.textContent = day;

        const count = document.createElement("span");
        count.className = "count";
        count.textContent = `${files.length}개`;

        top.appendChild(title);
        top.appendChild(count);

        const examples = document.createElement("div");
        examples.className = "examples";

        files.forEach(file => {
            const link = document.createElement("a");
            link.href = "edu/web/" + file;
            link.textContent = file;
            examples.appendChild(link);
        });

        card.appendChild(top);
        card.appendChild(examples);
        dayList.appendChild(card);
    });
</script>
</body>
</html>
