<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BuildEnough Study</title>
  <meta name="description" content="주제별로 공부한 내용을 정리한 저장소입니다." />
  <style>
    :root {
      --bg: #f7f8fa;
      --card: #ffffff;
      --text: #1f2328;
      --sub: #59636e;
      --line: #d0d7de;
      --primary: #0969da;
      --primary-hover: #0550ae;
      --shadow: 0 8px 24px rgba(31, 35, 40, 0.08);
      --radius: 18px;
      --max: 1100px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", Arial, sans-serif;
      background: linear-gradient(to bottom, #f7f8fa, #eef2f6);
      color: var(--text);
      line-height: 1.6;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .container {
      width: min(100% - 32px, var(--max));
      margin: 0 auto;
    }

    .hero {
      padding: 72px 0 36px;
    }

    .hero-box {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 40px 32px;
    }

    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 18px;
    }

    .badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: #eaf2ff;
      color: var(--primary);
      font-size: 14px;
      font-weight: 600;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(32px, 5vw, 52px);
      line-height: 1.15;
    }

    .hero p {
      margin: 0;
      color: var(--sub);
      font-size: 17px;
    }

    .hero-actions {
      margin-top: 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 18px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      font-weight: 600;
      transition: 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow);
    }

    .btn.primary {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }

    .btn.primary:hover {
      background: var(--primary-hover);
      border-color: var(--primary-hover);
    }

    .section {
      padding: 24px 0 64px;
    }

    .section-head {
      margin-bottom: 20px;
    }

    .section-head h2 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .section-head p {
      margin: 0;
      color: var(--sub);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat( auto-fit, minmax(240px, 1fr) );
      gap: 18px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 22px 20px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 210px;
    }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .card h3 {
      margin: 0;
      font-size: 22px;
    }

    .tag {
      font-size: 12px;
      font-weight: 700;
      color: var(--primary);
      background: #eaf2ff;
      padding: 6px 10px;
      border-radius: 999px;
      white-space: nowrap;
    }

    .card p {
      margin: 0;
      color: var(--sub);
      font-size: 15px;
      flex: 1;
    }

    .card-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .card-actions a {
      font-size: 14px;
      font-weight: 700;
      color: var(--primary);
    }

    .footer {
      padding: 12px 0 48px;
      color: var(--sub);
      font-size: 14px;
      text-align: center;
    }

    @media (max-width: 640px) {
      .hero-box {
        padding: 28px 20px;
      }

      .card {
        min-height: auto;
      }
    }
  </style>
</head>
<body>
  <header class="hero">
    <div class="container">
      <div class="hero-box">
        <div class="badge-row">
          <span class="badge">Java</span>
          <span class="badge">Python</span>
          <span class="badge">JavaScript</span>
          <span class="badge">Spring</span>
          <span class="badge">React</span>
          <span class="badge">Git</span>
          <span class="badge">Computer Science</span>
        </div>

        <h1>BuildEnough Study</h1>
        <p>주제별로 공부한 내용을 정리한 저장소</p>

        <div class="hero-actions">
          <a class="btn primary" href="https://github.com/BuildEnough/study" target="_blank" rel="noopener noreferrer">
            GitHub Repository
          </a>
          <a class="btn" href="https://github.com/BuildEnough/study/blob/master/README.md" target="_blank" rel="noopener noreferrer">
            README
          </a>
        </div>
      </div>
    </div>
  </header>

  <main class="section">
    <div class="container">
      <div class="section-head">
        <h2>분류</h2>
      </div>

      <div class="grid" id="categoryGrid"></div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      BuildEnough study repository
    </div>
  </footer>

  <script>
    const categories = [
      {
        title: "Java",
        tag: "Language",
        desc: "Java 문법, 객체지향, 예외처리, 컬렉션, 스레드 등 정리",
        folderUrl: "https://github.com/BuildEnough/study/tree/master/java"
      },
      {
        title: "Python",
        tag: "Language",
        desc: "Python 기초 문법, 함수, 클래스, 예외처리, 내장함수 정리",
        folderUrl: "https://github.com/BuildEnough/study/tree/master/python"
      },
      {
        title: "JavaScript",
        tag: "Language",
        desc: "JavaScript 기초 문법과 브라우저 예제 정리",
        folderUrl: "https://github.com/BuildEnough/study/tree/master/javascript"
      },
      {
        title: "Spring",
        tag: "Framework",
        desc: "Spring 관련 학습 및 프로젝트 정리",
        folderUrl: "https://github.com/BuildEnough/study/tree/master/spring"
      },
      {
        title: "Android",
        tag: "Framework",
        desc: "Android 실습 및 프로젝트 정리",
        folderUrl: "https://github.com/BuildEnough/study/tree/master/android"
      },
      {
        title: "Django",
        tag: "Framework",
        desc: "Django 학습 내용 정리",
        folderUrl: "https://github.com/BuildEnough/study/tree/master/Django"
      },
      {
        title: "React",
        tag: "Framework",
        desc: "React 프로젝트 및 학습 정리",
        folderUrl: "https://github.com/BuildEnough/study/tree/master/react"
      },
      {
        title: "Git",
        tag: "Tool",
        desc: "Git, GitHub, 브랜치 전략, 협업 방식 정리",
        folderUrl: "https://github.com/BuildEnough/study/tree/master/git"
      },
      {
        title: "DB",
        tag: "Database",
        desc: "데이터베이스 개념, 실습, 환경 설정 정리",
        folderUrl: "https://github.com/BuildEnough/study/tree/master/DB"
      },
      {
        title: "HTML / CSS",
        tag: "Frontend",
        desc: "HTML, CSS 실습 예제 정리",
        folderUrl: "https://github.com/BuildEnough/study/tree/master/htmlCss"
      },
      {
        title: "Computer Science",
        tag: "CS",
        desc: "네트워크, 운영체제, 자료구조, 웹, 백엔드 등 CS 기초 정리",
        folderUrl: "https://github.com/BuildEnough/study/tree/master/ComputerScience"
      },
      {
        title: "Edu",
        tag: "Etc",
        desc: "수업, 실습, 과제, 학습 자료 정리",
        folderUrl: "https://github.com/BuildEnough/study/tree/master/edu"
      }
    ];

    const grid = document.getElementById("categoryGrid");

    categories.forEach(item => {
      const card = document.createElement("article");
      card.className = "card";

      card.innerHTML = `
        <div class="card-top">
          <h3>${item.title}</h3>
          <span class="tag">${item.tag}</span>
        </div>
        <p>${item.desc}</p>
        <div class="card-actions">
          <a href="${item.folderUrl}" target="_blank" rel="noopener noreferrer">폴더 보기 →</a>
        </div>
      `;

      grid.appendChild(card);
    });
  </script>
</body>
</html>
