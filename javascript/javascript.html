<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JavaScript 연습</title>
</head>
<body>
<script>
    function line(str) {
        for (let i=1; i<=20; i++) {
            document.write(str);
        }
        document.write('end<br>');
    }

    line('*');
    line('&');
    line('@');
</script>
</body>
</html>
