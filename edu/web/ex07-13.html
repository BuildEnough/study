<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <style>
        table {
            margin: auto;
            box-shadow: 10px 10px 20px rgba(0, 0, 0, 0.541);
        }
        tr,
        td {
            padding: 5px 10px;
            background-color: aliceblue;
        }
        tr:nth-of-type(even) td {
            background-color: rgb(218, 255, 210);
        }
    </style>
    <script>
        const inp = prompt("몇 단을 보여드릴까요?");
        let list = ``;
            list += `<table>`;
            list += `    <tr>`;
            list += `        <td colspan="2" style="text-align: center;">구구단 ${inp}단</td>`;
            list += `    </tr>`;

            for (step = 1; step <=9; step++) {
                list += `    <tr>
                                <td>${inp} x ${step}</td>
                                <td>${inp * step}</td>
                            </tr>`;
                }

            list += `</table>`;
        document.write(list);
    </script>
  </head>
  <body>
  </body>
</html>
