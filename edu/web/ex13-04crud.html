<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        padding: 30px;
      }

      .container {
        width: 500px;
        margin: 0 auto;
        background-color: white;
        padding: 20px;
        border: 1px solid #ccc;
      }

      h1 {
        text-align: center;
      }

      input {
        width: 70%;
        padding: 8px;
        margin-right: 5px;
      }

      button {
        padding: 8px 10px;
        cursor: pointer;
      }

      ul {
        list-style: none;
        padding: 0;
        margin-top: 20px;
      }

      li {
        display: flex;
        align-items: center;
        gap: 10px;
        background-color: #eee;
        margin-bottom: 10px;
        padding: 10px;
      }

      li input[type="checkbox"] {
        margin: 0; /*  기본 여백 제거 (중요) */
        width: 16px;
        height: 16px;
        flex-shrink: 0;
      }

      li > div:first-child {
        flex: 1; /* 내용이 남은 공간 차지 */
      }

      .btn-area {
        margin-left: auto;
      }

      .btn-area button {
        margin-right: 5px;
      }

      .done {
        text-decoration: line-through;
        color: gray;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>과제</h1>

      <input type="text" id="textInput" placeholder="내용을 입력하세요" />

      <button onclick="addItem()">추가</button>

      <ul id="list"></ul>
    </div>

    <script>
      // 데이터를 저장 배열
      let items = [];

      // 페이지가 열리면 localStorage에 저장된 데이터를 불러옴
      window.onload = function () {
        let savedItems = localStorage.getItem("items");

        // 저장된 값이 있으면 배열로 변환해서 items에 넣음
        if (savedItems) {
          items = JSON.parse(savedItems);
        }
        renderList();
      };

      // create
      function saveItems() {
        localStorage.setItem("items", JSON.stringify(items));
      }

      // read
      function renderList() {
        let list = document.getElementById("list");

        list.innerHTML = "";

        // items 배열 길이만큼 반복
        for (let i = 0; i < items.length; i++) {
          let li = document.createElement("li"); // li 태그 생성

          let text = document.createElement("div"); // 내용 표시용 div 생성
          text.innerText = items[i];

          // 체크박스 시작
          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";

          li.appendChild(checkbox);

          /* 체크 시 완료_SY */
          checkbox.addEventListener("change", () => {
            li.classList.toggle("done", checkbox.checked);
          });

          /* li 클릭 시 체크와 연동(토글)_SY */
          li.addEventListener("click", (e) => {
            if (e.target !== checkbox) {
              checkbox.checked = !checkbox.checked;
              li.classList.toggle("done", checkbox.checked);
            }
          });
          // 체크박스 종료

          let btnArea = document.createElement("div"); // 수정/삭제 버튼 영역 생성
          btnArea.className = "btn-area";

          let editBtn = document.createElement("button"); // 수정 버튼 생성
          editBtn.innerText = "수정";
          editBtn.onclick = function () {
            editItem(i);
          };

          let deleteBtn = document.createElement("button"); // 삭제 버튼 생성
          deleteBtn.innerText = "삭제";
          deleteBtn.onclick = function () {
            deleteItem(i);
          };

          // 버튼 영역에 버튼 넣기
          btnArea.appendChild(editBtn);
          btnArea.appendChild(deleteBtn);

          // li에 내용과 버튼 영역 넣기
          li.appendChild(text);
          li.appendChild(btnArea);

          // ul에 li 추가
          list.appendChild(li);
        }
      }

      // 데이터 추가 함수
      function addItem() {
        let input = document.getElementById("textInput");
        let value = input.value.trim();

        if (value === "") {
          // 입력값이 비어 있으면 추가하지 않음
          alert("내용을 입력하세요");
          return;
        }
        items.push(value); // 새 데이터 추가

        saveItems(); // create

        renderList(); // read

        input.value = ""; // 입력창 비우기
      }

      // update
      function editItem(index) {
        // 기존 값을 보여줌
        let newValue = prompt("수정할 내용을 입력하세요", items[index]);

        if (newValue === null) {
          // 취소 누르면 종료
          return;
        }

        newValue = newValue.trim(); // 앞뒤 공백 제거

        if (newValue === "") {
          // 빈 값이면 수정 ㄴㄴ
          alert("빈 값으로 수정할 수 없습니다");
          return;
        }

        items[index] = newValue; // 핵심

        // 저장 후 다시 출력
        saveItems();
        renderList();
      }

      // delete
      function deleteItem(index) {
        let check = confirm("정말 삭제하시겠습니까?");

        if (check) {
          // 확인을 누르면 삭제
          items.splice(index, 1);

          // 저장 후 다시 출력
          saveItems();
          renderList();
        }
      }
    </script>
  </body>
</html>
