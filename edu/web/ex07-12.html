<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <style>
        table {
            margin: auto;
            text-align: center;
        }
        h2 {
            text-align: center;
        }
        tr,
        td {
            border: 1px solid #ccc;
            padding: 5px;
        }
        td:first-of-type {
            background-color: rgb(50, 111, 116);
        }
    </style>
    <script>
        const inp = prompt("원하는 가격을 넣으세요: ")
      const list = `
        <h2>할인율</h2>
        <table>
            <tr>
                <td>원가:</td>
                <td>${inp}</td>
            </tr>
            <tr>
                <td>10%할인</td>
                <td>${inp - (inp * 0.1)}</td>
            </tr>
            <tr>
                <td>20%할인</td>
                <td>${inp - (inp * 0.2)}</td>
            </tr>
            <tr>
                <td>30%할인</td>
                <td>${inp - (inp * 0.3)}</td>
            </tr>
        </table>
      `;
      document.write(list);
    </script>
  </head>
  <body>    

  </body>
</html>
