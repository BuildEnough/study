<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>네이버아이콘</title>
    <style>
        ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            gap: 12px;
        }

        li {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            border: 1px solid #e8e8e8;
            background-color: #fff;
            background-image: url(./data/sample_naver.png);
            background-size: 480px 480px;
            background-repeat: no-repeat;
        }

        .icon1 {
            background-position: -220px -220px;
        }

        .icon2 {
            background-position: -220px -20px;
        }

        .icon3 {
            background-position: -20px -220px;
        }

        .icon4 {
            background-position: -120px -220px;
        }
    </style>
</head>
<body>
    <h1>background(네이버아이콘)</h1>
    <hr />
    <a href="index.html">홈으로</a><br />
    <div class="menu">
        <ul>
            <li class="icon1"></li>
            <li class="icon2"></li>
            <li class="icon3"></li>
            <li class="icon4"></li>
        </ul>
    </div>
</body>
</html>
