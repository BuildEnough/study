<!doctype html>
<html lang="ko">
  <head>

    #box {
        background-color: rgb(235, 216, 191);
        width: 400px;

        margin: 10% auto;
        padding: 40px 10px 40px 30px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        justify-content: space-evenly;
        box-shadow: 10px 10px 20px rgba(0, 0, 0, 0.562);

        box-shadow: 10px 10px 20px rgba(50, 50, 50, 0.5);
        padding: 10px;
        text-align: center;
        font-weight: bold;
    }
</style>
  </head>
