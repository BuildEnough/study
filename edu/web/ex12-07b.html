
<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <link rel="stylesheet" href="ex12-07b.css">
    <script src="ex12-07b.js" defer></script>
    <style>
      body {
        margin: 0;
        padding: 0;
        height: 480vh;
      }
      section {
        height: 95vh;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        color: burlywood;
        background-color: aliceblue;
        font-size: 3rem;
      }
      section:nth-of-type(even) {
        background-color: rgb(176, 231, 235);
        color: cadetblue;
      }
      .scroll-text {
        position: fixed;
        top: 250px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 1.3rem;
        font-weight: bold;
        box-shadow: 10px 10px 30px rgba(0, 0, 0, 0.479);
        padding: 10px;
        border-radius: 20px;
      }
      .left-menu,
      .right-menu {
        position: fixed;
        height: 250px;
        color: white;
        padding: 20px;
        border-radius: 10px;
        top: 100px;
        opacity: 0;
        transition: 0.5s ease;
        z-index: 10;
      }
      .right-menu {
        width: 250px;
        right: -200px;
        background-color: rgba(146, 78, 15, 0.651);
      }
      .left-menu {
        width: 150px;
        background-color: rgba(47, 141, 204, 0.651);
        left: -200px;
      }
      .left-menu2 {
        left: -200px;
        top: 500px;
        width: 500px;
        background-color: rgba(16, 155, 109, 0.651);
      }
      .left-show {
        opacity: 1;
        left: 10px;
      }
      .right-show {
        opacity: 1;
        right: 10px;
      }
      ul {
        padding-left: 15px;
      }
      .end-line {
        display: flex;
        justify-content: center;
      }
      .end-menu {
        position: fixed;
        bottom: 0;
        font-size: 2rem;
        background-color: rgb(240, 94, 49);
        color: white;
        padding: 20px;
        border-radius: 10px;
        height: 50px;
        text-align: center;
        transition: 0.5s ease;
        width: 22%;
        opacity: 0;
      }
      .end-show {
        width: 100%;
        opacity: 1;
      }
      .t1 {
        font-size: 1rem;
        color: black;
        transform: scaleX(-1);
        transition: 1s ease;
      }
      tr,
      td {
        text-align: center;
        width: 200px;
        height: 50px;
        border: 1px solid #ccc;
      }
      .turn {
        transform: scaleX(1);
      }
    </style>
  </head>
  <body>
    <div class="scroll-text" id="scrollText">
      첫 단계에요. 스크롤을 내려보세요.
    </div>

    <div class="left-menu" id="leftMenu"></div>

    <div class="right-menu" id="rightMenu">
      오른쪽 메뉴
      <ul>
        <li>Lorem, ipsum dolor.</li>
        <li>Lorem, ipsum dolor.</li>
        <li>Lorem, ipsum dolor.</li>
        <li>Lorem, ipsum dolor.</li>
        <li>Lorem, ipsum dolor.</li>
        <li>Lorem, ipsum dolor.</li>
      </ul>
    </div>
    <div class="end-line">
      <div class="end-menu" id="endMenu">감사합니다.</div>
    </div>

    <section>1단계</section>
    <section>2단계</section>
    <section>
      3단계
      <table class="t1">
        <tr>
          <td>테스트1</td>
          <td>테스트2</td>
          <td>테스트3</td>
        </tr>
        <tr>
          <td>테스트1</td>
          <td>테스트2</td>
          <td>테스트3</td>
        </tr>
        <tr>
          <td>테스트1</td>
          <td>테스트2</td>
          <td>테스트3</td>
        </tr>
        <tr>
          <td>테스트1</td>
          <td>테스트2</td>
          <td>테스트3</td>
        </tr>
        <tr>
          <td>테스트1</td>
          <td>테스트2</td>
          <td>테스트3</td>
        </tr>
      </table>
    </section>
    <section>4단계</section>
    <section>End Line</section>
  </body>
</html>
